<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wellness Confirmation</title>

<style>

/* 🌅 BACKGROUND */
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: url("hotel.jpg") no-repeat center/cover;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ✨ GLASS CARD */
.box{
    width:500px;
    padding:40px;
    border-radius:20px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    color:white;
}

/* 🌿 TITLE */
h2{
    text-align:center;
    font-size:28px;
    margin-bottom:25px;
    color:#ffd700;
}

/* 📋 DETAILS */
p{
    font-size:18px;
    margin:12px 0;
}

/* 🌟 LABEL STYLE */
b{
    color:#ffdf9e;
}

/* 💰 TOTAL */
.total{
    font-size:22px;
    margin-top:20px;
    font-weight:bold;
    color:#ffd700;
}

/* 🔘 BUTTON */
button{
    margin-top:25px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background: linear-gradient(135deg,#c9a96e,#ffd700);
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

/* 🔥 HOVER */
button:hover{
    transform: scale(1.05);
    box-shadow:0 5px 20px rgba(255,215,0,0.6);
}

</style>

</head>

<body>

<div class="box">

<h2>🌿 Wellness Booking Confirmed</h2>

<div id="data"></div>

<button onclick="goHome()">Back to Home</button>

</div>

<script>

let data = JSON.parse(localStorage.getItem("wellness"));

if(data){

document.getElementById("data").innerHTML = `
<p><b>Name:</b> ${data.name}</p>
<p><b>Date:</b> ${data.date}</p>
<p><b>Services:</b> ${data.services.join(", ")}</p>
<p class="total">Total: ₹${data.total}</p>
`;

}

function goHome(){
window.location.href="hotel.html";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking Confirmation</title>
<link rel="stylesheet" href="confirm.css">
</head>

<body>

<div class="confirm-container">

    <div class="confirm-card">

        <h1>Booking Confirmed 🎉</h1>
        <p>Thank you for choosing Lumeria</p>

        <div class="details">
            <p><strong>Name:</strong> <span id="user"></span></p>
            <p><strong>Destination:</strong> <span id="destination"></span></p>
            <p><strong>Check-in:</strong> <span id="checkin"></span></p>
            <p><strong>Check-out:</strong> <span id="checkout"></span></p>

        <hr>

            <p><strong>Room Type:</strong> <span id="room"></span></p>
<p><strong>No. of Rooms:</strong> <span id="rooms"></span></p>
<p><strong>Room Numbers:</strong> <span id="roomNumbers"></span></p>

<hr>

<h3>Total Cost: ₹<span id="total"></span></h3>
        </div>

        <button onclick="goHome()">Back to Home</button>

    </div>

</div>

<script>
window.onload = function () {

    let booking = JSON.parse(localStorage.getItem("booking"));

    if (!booking) {
        alert("No booking found!");
        return;
    }

    document.getElementById("user").innerText = booking.user;
    document.getElementById("destination").innerText = booking.destination;
    document.getElementById("checkin").innerText = booking.checkin;
    document.getElementById("checkout").innerText = booking.checkout;
    document.getElementById("room").innerText = booking.roomType;

    // ✅ NEW FIELDS
    document.getElementById("rooms").innerText = booking.rooms;
    document.getElementById("roomNumbers").innerText = booking.roomNumbers.join(", ");
    document.getElementById("total").innerText = booking.total;
};
function goHome() {
    window.location.href = "hotel.html"; // change if needed
}
</script>

</body>
</html>
